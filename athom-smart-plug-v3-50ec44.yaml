substitutions:
  name: athom-smart-plug-v3-50ec44
  friendly_name: Dishwasher power plug

packages:
  Athom_Technology.Smart_Plug_V3: github://athom-tech/esp32-configs/athom-smart-plug.yaml

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino
  flash_size: 4MB                          # specify flash size here (not in platformio_options)

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret dishwasher_api_key

ota:
  - platform: web_server                   # keep browser OTA
